name: Deploy to Dokploy

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Frontend
        run: curl -X POST ${{ secrets.DOKPLOY_FRONTEND_WEBHOOK }}

      - name: Deploy Backend
        run: curl -X POST ${{ secrets.DOKPLOY_BACKEND_WEBHOOK }}
